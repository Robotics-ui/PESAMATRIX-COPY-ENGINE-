openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PesaMatrix Copy Trading SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: admin
    description: Admin operations
  - name: master-account
    description: Admin — Master MT5 account & CopyFactory strategy
  - name: mt5
    description: User — MT5 account management via MetaApi
  - name: payments
    description: M-Pesa payment operations
  - name: subscriptions
    description: Subscription management
  - name: trading
    description: Trading signals and performance

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ─────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Validation"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/update:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Plans (public) ───────────────────────────────────────────────────────────
  /public/plans:
    get:
      operationId: listPlans
      tags: [subscriptions]
      summary: List active subscription plans
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"

  # ── Subscriptions ────────────────────────────────────────────────────────────
  /subscriptions/my:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get current user subscription status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MySubscriptionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /subscriptions/history:
    get:
      operationId: getSubscriptionHistory
      tags: [subscriptions]
      summary: Get subscription history for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Payments ─────────────────────────────────────────────────────────────────
  /payments/initiate:
    post:
      operationId: initiatePayment
      tags: [payments]
      summary: Initiate M-Pesa STK Push payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInitiateRequest"
      responses:
        "200":
          description: STK Push sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentInitiateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /payments/status/{checkoutRequestId}:
    get:
      operationId: getPaymentStatus
      tags: [payments]
      summary: Poll payment status by checkout request ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: checkoutRequestId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /payments/history:
    get:
      operationId: getPaymentHistory
      tags: [payments]
      summary: Get payment history for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Trading / Signals ────────────────────────────────────────────────────────
  /trading/signals:
    get:
      operationId: getTradingSignals
      tags: [trading]
      summary: Get recent copied trade signals for current subscriber
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingSignalsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /trading/performance:
    get:
      operationId: getTradingPerformance
      tags: [trading]
      summary: Get subscriber trading performance summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingPerformanceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /trading/dashboard:
    get:
      operationId: getSubscriberDashboard
      tags: [trading]
      summary: Subscriber dashboard — signals count, win rate, active plan, total profit
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberDashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Admin general ────────────────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: adminDashboard
      tags: [admin]
      summary: Admin dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get user detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/audit-logs:
    get:
      operationId: adminAuditLogs
      tags: [admin]
      summary: Audit log trail
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsResponse"

  /admin/subscribers:
    get:
      operationId: adminListSubscribers
      tags: [admin]
      summary: List all CopyFactory subscriber relationships
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSubscribersResponse"

  /admin/subscriptions:
    get:
      operationId: adminListSubscriptions
      tags: [admin]
      summary: List all subscriptions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSubscriptionsResponse"

  /admin/plans:
    get:
      operationId: adminListPlans
      tags: [admin]
      summary: List all plans
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"
    post:
      operationId: adminCreatePlan
      tags: [admin]
      summary: Create a subscription plan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanResponse"

  /admin/plans/{id}:
    patch:
      operationId: adminUpdatePlan
      tags: [admin]
      summary: Update a subscription plan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: Get admin platform settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettingsResponse"
    patch:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update admin platform settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettingsResponse"

  # ── Master account (admin) ───────────────────────────────────────────────────
  /admin/master-account:
    post:
      operationId: registerMasterAccount
      tags: [master-account]
      summary: Register and deploy master MT5 account + create CopyFactory strategy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterMasterAccountRequest"
      responses:
        "201":
          description: Master account deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterAccountResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "502":
          $ref: "#/components/responses/BadGateway"
    get:
      operationId: getMasterAccount
      tags: [master-account]
      summary: Get master account details from DB
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterAccountDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMasterAccount
      tags: [master-account]
      summary: Remove master account from MetaApi and DB
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/master-account/status:
    get:
      operationId: getMasterAccountStatus
      tags: [master-account]
      summary: Refresh deployment and synchronization status from MetaApi
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  /admin/master-account/redeploy:
    post:
      operationId: redeployMasterAccount
      tags: [master-account]
      summary: Trigger a redeploy of the master account on MetaApi
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Redeploy initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  /admin/master-account/strategy:
    get:
      operationId: getMasterStrategy
      tags: [master-account]
      summary: Get CopyFactory strategy details from MetaApi
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  # ── User MT5 accounts ────────────────────────────────────────────────────────
  /mt5/accounts:
    get:
      operationId: listMt5Accounts
      tags: [mt5]
      summary: List my MT5 accounts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mt5AccountsListResponse"
    post:
      operationId: registerMt5Account
      tags: [mt5]
      summary: Register an MT5 account (no deployment yet)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterMt5Request"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mt5AccountResponse"
        "422":
          $ref: "#/components/responses/Validation"

  /mt5/accounts/{id}:
    get:
      operationId: getMt5Account
      tags: [mt5]
      summary: Get account detail with MetaApi and CopyFactory info
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mt5AccountDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMt5Account
      tags: [mt5]
      summary: Undeploy and remove MT5 account
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /mt5/accounts/{id}/deploy:
    post:
      operationId: deployMt5Account
      tags: [mt5]
      summary: Deploy account to MetaApi and register with CopyFactory
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployMt5Request"
      responses:
        "200":
          description: Deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployMt5Response"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "502":
          $ref: "#/components/responses/BadGateway"

  /mt5/accounts/{id}/status:
    get:
      operationId: getMt5AccountStatus
      tags: [mt5]
      summary: Refresh deployment and sync status from MetaApi
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  /mt5/accounts/{id}/copyfactory:
    post:
      operationId: registerMt5CopyFactory
      tags: [mt5]
      summary: Register account as a CopyFactory subscriber
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCopyFactoryRequest"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadGateway"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Validation:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: MetaApi or CopyFactory upstream error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
      required: [email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
      required: [accessToken]

    ProfileUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [admin, subscriber]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, email, role]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [accessToken, user]

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [user]

    # ── Plans ────────────────────────────────────────────────────────────────────
    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        pricePerDay:
          type: string
        minimumDays:
          type: integer
        maximumDays:
          type: integer
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, pricePerDay, minimumDays, maximumDays, features, isActive]

    PlansResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/Plan"
      required: [plans]

    PlanResponse:
      type: object
      properties:
        plan:
          $ref: "#/components/schemas/Plan"
      required: [plan]

    PlanInput:
      type: object
      properties:
        name:
          type: string
        pricePerDay:
          type: string
        minimumDays:
          type: integer
        maximumDays:
          type: integer
        features:
          type: array
          items:
            type: string
      required: [name, pricePerDay, minimumDays, maximumDays]

    PlanUpdate:
      type: object
      properties:
        name:
          type: string
        pricePerDay:
          type: string
        minimumDays:
          type: integer
        maximumDays:
          type: integer
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    # ── Subscriptions ────────────────────────────────────────────────────────────
    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, active, expired, cancelled]
        isActive:
          type: boolean
        startDate:
          type: ["string", "null"]
          format: date-time
        endDate:
          type: ["string", "null"]
          format: date-time
        numberOfDays:
          type: integer
        amountPaid:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, userId, planId, status, isActive, numberOfDays, amountPaid]

    MySubscriptionResponse:
      type: object
      properties:
        subscription:
          type: ["object", "null"]
          $ref: "#/components/schemas/Subscription"
        plan:
          type: ["object", "null"]
